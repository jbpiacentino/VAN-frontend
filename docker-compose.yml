services:
  van:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NUXT_APP_BASE_URL: /van/
    image: van-frontend:latest
    container_name: van-frontend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_APP_BASE_URL: /van/
    ports:
      - '127.0.0.1:3001:3000'
